name: Build Self-Contained Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore
      run: dotnet restore RoadSurveyWPF/RoadSurvey.csproj
    
    - name: Publish Self-Contained
      run: |
        dotnet publish RoadSurveyWPF/RoadSurvey.csproj `
          -c Release `
          -r win-x64 `
          --self-contained `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true
    
    - name: Upload Release
      uses: softprops/action-gh-release@v1
      with:
        files: RoadSurveyWPF/bin/Release/net8.0-windows/win-x64/publish/RoadSurvey.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}