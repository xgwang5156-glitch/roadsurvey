name: Build Self-Contained Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Clean and Restore
      # 强制清除缓存并还原
      run: |
        dotnet clean
        dotnet restore --no-cache
    
    - name: Publish Self-Contained
      # 这里的路径不需要写文件夹前缀了
      run: |
        dotnet publish RoadSurvey.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
    
    - name: Upload Release
      uses: softprops/action-gh-release@v1
      with:
        files: bin/Release/net8.0-windows/win-x64/publish/RoadSurvey.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
